<title>Bellazüre – Perfumes Árabes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0.55) 0%,
      rgba(0,0,0,0.72) 40%,
      rgba(0,0,0,0.92) 100%);
    z-index: 1;
  }
  .logo-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
    animation: fadeIn 2.6s ease forwards;
  }
  .logo-wrap img {
    width: min(620px, 85vw);
    mix-blend-mode: screen;
    opacity: 0.55;
  }
  .tagline {
    font-family: Georgia, serif;
    font-size: clamp(11px, 1.4vw, 15px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(212,175,55,0.65);
    animation: fadeIn 3.8s ease forwards;
  }
  .divider {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.65), transparent);
    animation: expand 2.2s ease 1.2s both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes expand {
    from { width: 0; opacity: 0; }
    to   { width: 100px; opacity: 1; }
  }
</style>
</head>

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const Gr = 212, Gg = 175, Gb = 55;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initSparkles(); });

/* ── 8-point Islamic star ── */
function drawStar8(cx, cy, r1, r2, alpha, lineW, rot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 16; i++) {
    const a = i * Math.PI / 8 - Math.PI / 2;
    const r = i % 2 === 0 ? r1 : r2;
    i === 0 ? ctx.moveTo(r * Math.cos(a), r * Math.sin(a))
            : ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(${Gr},${Gg},${Gb},${alpha})`;
  ctx.lineWidth = lineW;
  ctx.stroke();
  ctx.restore();
}

/* ── Hexagon ── */
function drawHex(cx, cy, r, alpha, rot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    i === 0 ? ctx.moveTo(r * Math.cos(a), r * Math.sin(a))
            : ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(${Gr},${Gg},${Gb},${alpha})`;
  ctx.lineWidth = 0.4;
  ctx.stroke();
  ctx.restore();
}

/* ── 4-ray cross sparkle ── */
function drawSparkle(x, y, size, alpha) {
  ctx.save();
  ctx.translate(x, y);
  // long cross rays
  for (let rot of [0, Math.PI / 2]) {
    ctx.save();
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.moveTo(-size, 0);
    ctx.quadraticCurveTo(0,  size * 0.09,  size, 0);
    ctx.quadraticCurveTo(0, -size * 0.09, -size, 0);
    const g = ctx.createLinearGradient(-size, 0, size, 0);
    g.addColorStop(0,   `rgba(${Gr},${Gg},${Gb},0)`);
    g.addColorStop(0.5, `rgba(${Gr},${Gg},${Gb},${alpha})`);
    g.addColorStop(1,   `rgba(${Gr},${Gg},${Gb},0)`);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }
  // diagonal half-length rays
  for (let rot of [Math.PI / 4, -Math.PI / 4]) {
    ctx.save();
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.moveTo(-size * 0.45, 0);
    ctx.quadraticCurveTo(0,  size * 0.05,  size * 0.45, 0);
    ctx.quadraticCurveTo(0, -size * 0.05, -size * 0.45, 0);
    const g = ctx.createLinearGradient(-size * 0.45, 0, size * 0.45, 0);
    g.addColorStop(0,   `rgba(${Gr},${Gg},${Gb},0)`);
    g.addColorStop(0.5, `rgba(${Gr},${Gg},${Gb},${alpha * 0.55})`);
    g.addColorStop(1,   `rgba(${Gr},${Gg},${Gb},0)`);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }
  // bright core
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,248,210,${Math.min(alpha * 3, 1)})`;
  ctx.fill();
  ctx.restore();
}

/* ── Sparkles ── */
const sparkles = [];
function initSparkles() {
  sparkles.length = 0;
  for (let i = 0; i < 45; i++) {
    sparkles.push({
      x:     Math.random() * canvas.width,
      y:     Math.random() * canvas.height,
      phase: Math.random() * Math.PI * 2,
      freq:  0.25 + Math.random() * 0.55,
      size:  6 + Math.random() * 9,
      peak:  0.55 + Math.random() * 0.35,
    });
  }
}
initSparkles();

let t = 0;

function draw() {
  t += 0.003;
  const W = canvas.width, H = canvas.height;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  /* ── Star lattice ── */
  const base = Math.min(W, H) * 0.065;
  const cw = base * 2.5;
  const ch = base * 2.5;
  const cols = Math.ceil(W / cw) + 2;
  const rows = Math.ceil(H / ch) + 2;

  for (let row = 0; row <= rows; row++) {
    for (let col = 0; col <= cols; col++) {
      const cx = (col - 0.5) * cw;
      const cy = (row - 0.5) * ch;

      const dx = (cx - W / 2) / (W / 2);
      const dy = (cy - H / 2) / (H / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);

      const pulse = Math.sin(t * 1.1 + col * 0.55 + row * 0.45) * 0.06;
      const alpha = Math.max(0, 0.42 - dist * 0.14 + pulse);
      if (alpha < 0.01) continue;

      const rot = t * 0.04 + col * 0.08 + row * 0.06;

      /* outer star */
      drawStar8(cx, cy, base * 0.88, base * 0.40, alpha, 0.8, rot);
      /* inner star counter-rotates */
      drawStar8(cx, cy, base * 0.30, base * 0.14, alpha * 0.6, 0.5, -rot * 0.7);
      /* connecting hexagon */
      drawHex(cx, cy, base * 0.42, alpha * 0.35, rot * 0.3);
    }
  }

  /* ── Ornamental corner arcs ── */
  [[0,0],[W,0],[0,H],[W,H]].forEach(([x, y]) => {
    const maxR = Math.min(W, H) * 0.30;
    for (let i = 1; i <= 5; i++) {
      const r = (maxR / 5) * i + Math.sin(t * 0.6 + i) * 2;
      const a = 0.12 - i * 0.018;
      if (a <= 0) continue;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${Gr},${Gg},${Gb},${a})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
  });

  /* ── Radial rings around center ── */
  for (let i = 1; i <= 3; i++) {
    const r = Math.min(W, H) * 0.12 * i + Math.sin(t * 0.7 + i) * 5;
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${Gr},${Gg},${Gb},${0.08 - i * 0.02})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  /* ── Sparkles ── */
  sparkles.forEach(sp => {
    sp.phase += sp.freq * 0.012;
    const s = Math.sin(sp.phase);
    const bright = s > 0 ? Math.pow(s, 4) : 0;
    if (bright > 0.01) {
      drawSparkle(sp.x, sp.y, sp.size * (0.6 + bright * 0.7), bright * sp.peak);
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
